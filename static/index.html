<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>VQPAINT</title>
<style>
  :root {
    --bg: #101014; --panel: #16161b; --panel2: #1b1b21; --line: #26262c;
    --txt: #d6d6dc; --mut: #8b8b96; --acc: #8fbf98; --warn: #e0b56a; --err: #e06a6a;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg);
               font: 13px/1.45 system-ui, sans-serif; color: var(--txt); }
  canvas.pixi { position: fixed; inset: 0; }

  /* ── left tool rail ─────────────────────────── */
  #rail { position: fixed; top: 12px; left: 12px; width: 44px; z-index: 10;
          background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 6px 4px; display: flex; flex-direction: column; gap: 4px; }
  #rail button { width: 36px; height: 36px; border: 0; border-radius: 8px;
          background: transparent; color: var(--mut); font-size: 16px; cursor: pointer; }
  #rail button:hover { background: var(--panel2); color: var(--txt); }
  #rail button.active { background: var(--panel2); color: var(--acc);
          box-shadow: inset 0 0 0 1px var(--acc); }
  #rail .sep { height: 1px; background: var(--line); margin: 4px 6px; }

  /* ── right inspector ────────────────────────── */
  #inspector { position: fixed; top: 12px; right: 12px; bottom: 44px; width: 264px;
          z-index: 10; background: var(--panel); border: 1px solid var(--line);
          border-radius: 10px; padding: 14px; overflow-y: auto; }
  #inspector h1 { font-size: 13px; font-weight: 600; color: var(--txt); margin: 0 0 10px; }
  #inspector h1 .hint { color: var(--mut); font-weight: 400; font-size: 12px; }
  label { display: block; margin-top: 10px; color: var(--mut); font-size: 11px;
          text-transform: uppercase; letter-spacing: .06em; cursor: help; }
  label .val { float: right; color: var(--txt); text-transform: none; }
  textarea { width: 100%; box-sizing: border-box; background: var(--bg); color: var(--txt);
          border: 1px solid var(--line); border-radius: 6px; padding: 7px; resize: vertical;
          min-height: 48px; font: inherit; margin-top: 4px; }
  input[type=range] { width: 100%; accent-color: var(--acc); }
  input[type=number], input[type=text] { width: 90px; background: var(--bg); color: var(--txt);
          border: 1px solid var(--line); border-radius: 6px; padding: 5px 7px; font: inherit; }
  select { width: 100%; background: var(--bg); color: var(--txt); border: 1px solid var(--line);
          border-radius: 6px; padding: 5px; font: inherit; margin-top: 4px; }
  button { background: var(--panel2); color: var(--txt); border: 1px solid var(--line);
          border-radius: 6px; padding: 6px 11px; font: inherit; cursor: pointer; }
  button:hover { border-color: var(--mut); }
  button.primary { background: #2a3c2f; border-color: #3e5a46; color: #cfe8d5; }
  button.chip { padding: 3px 9px; font-size: 12px; border-radius: 99px; }
  button.chip.on { color: var(--acc); border-color: var(--acc); }
  .row { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  details { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 6px; }
  details summary { color: var(--mut); font-size: 11px; text-transform: uppercase;
          letter-spacing: .06em; cursor: pointer; user-select: none; }
  .global { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 6px; }
  .tool-group { display: none; }
  .tool-group.show { display: block; }

  /* ── bottom status strip ────────────────────── */
  #strip { position: fixed; left: 12px; right: 12px; bottom: 8px; height: 26px; z-index: 10;
          background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
          display: flex; align-items: center; gap: 18px; padding: 0 12px;
          font-size: 12px; color: var(--mut); }
  #strip .job { color: var(--warn); }
  #strip .save { margin-left: auto; }
  #strip button { padding: 1px 8px; font-size: 11px; }

  /* ── queue cards ────────────────────────────── */
  #jobs { position: fixed; bottom: 44px; left: 68px; width: 320px; z-index: 9;
          max-height: 34vh; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 4px; }
  .job { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
         padding: 6px 9px; font-size: 12px; }
  .job .st-running { color: var(--warn); } .job .st-done { color: var(--acc); }
  .job .st-queued { color: #8888c8; } .job .st-error { color: var(--err); }
  .job .st-cancelled, .job .st-stopped { color: var(--mut); }
  .job .prompt { color: var(--mut); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job button { float: right; padding: 1px 7px; font-size: 11px; margin-left: 6px; }
</style>
</head>
<body>

<div id="rail">
  <button id="toolPlace" class="active" title="place — soft square region (1)">■</button>
  <button id="toolBrush" title="brush — paint the area to generate (2)">✦</button>
  <button id="toolWand" title="select — wand/rect/lasso, then generate into it (3)">⚲</button>
  <button id="toolImage" title="image — place a PNG/JPG and paint it in (4)">⇓</button>
  <div class="sep"></div>
  <button id="saveNow" title="save a canvas version now">✓</button>
  <input type="file" id="imageFile" accept="image/*" style="display:none">
</div>

<div id="inspector">
  <h1 id="toolTitle">place <span class="hint">— click canvas to paint</span></h1>

  <label title="What should grow here. LEAVE EMPTY to let the region flow purely out of its surroundings — the flow brush is the heart of the tool.">prompt</label>
  <textarea id="prompt" placeholder="empty = flow from surroundings"></textarea>

  <div class="tool-group" data-tool="place brush wand image" style="display:block">
    <label title="How long it cooks. Low = soft and dreamy, high = crisp, very high = fried. ~2 iterations/sec.">iterations <span class="val" id="itersVal">200</span></label>
    <input type="range" id="iters" min="10" max="1500" step="5" value="200">
    <div class="row">
      <button class="chip" id="presetDraft" title="fast feedback: 80 iterations">draft</button>
      <button class="chip" id="presetRefine" title="full cook: 350 iterations">refine</button>
    </div>
  </div>

  <div class="tool-group" data-tool="place image">
    <label title="Region side in canvas pixels (image tool: placed width). Any size — beyond 576 the engine works coarser and stretches, like a wide brush.">size <span class="val" id="sizeVal">512</span></label>
    <input type="range" id="size" min="128" max="2048" step="16" value="512">
  </div>

  <div class="tool-group" data-tool="brush">
    <label title="Brush radius in canvas pixels">radius <span class="val" id="radiusVal">96</span></label>
    <input type="range" id="radius" min="16" max="512" step="8" value="96">
  </div>

  <div class="tool-group" data-tool="wand">
    <div class="row">
      <button class="chip selmode on" data-mode="wand" title="click a color — selects the connected same-color area">wand</button>
      <button class="chip selmode" data-mode="similar" title="click anything — selects everything that LOOKS like it (CLIP similarity), even far away">similar</button>
      <button class="chip selmode" data-mode="rect" title="drag a rectangle">rect</button>
      <button class="chip selmode" data-mode="lasso" title="draw a freehand outline">lasso</button>
      <button class="chip selmode" data-mode="brushsel" title="paint the selection with a round brush">brush</button>
    </div>
    <div id="selParamTol">
      <label title="How different a color can be and still join the wand selection">tolerance <span class="val" id="tolVal">18</span></label>
      <input type="range" id="tolerance" min="2" max="80" step="1" value="18">
    </div>
    <div id="selParamSim" style="display:none">
      <label title="How semantically close a region must look to join the selection. Lower grabs more.">similarity <span class="val" id="simVal">0.78</span></label>
      <input type="range" id="similarity" min="0.5" max="0.95" step="0.01" value="0.78">
    </div>
    <div id="selParamRad" style="display:none">
      <label title="Selection brush radius">radius <span class="val" id="selRadVal">96</span></label>
      <input type="range" id="selRadius" min="16" max="512" step="8" value="96">
    </div>
    <div class="row" id="selOps" style="display:none">
      <button class="chip" id="selGrow" title="expand the selection edge outward">grow</button>
      <button class="chip" id="selShrink" title="pull the selection edge inward">shrink</button>
      <button class="chip" id="selFeather" title="soften the selection edge">feather</button>
      <button class="chip" id="selInvert" title="select everything in the box EXCEPT the current selection">invert</button>
    </div>
  </div>

  <div class="tool-group" data-tool="image">
    <label title="How much of your image survives: low = ghost armature, high = recognizably yours. It always gets VQGAN-ified — that's the medium.">source strength <span class="val" id="strengthVal">0.60</span></label>
    <input type="range" id="strength" min="0" max="1" step="0.05" value="0.6">
    <div class="row"><button id="pickImage">choose image…</button><span id="imageName" style="color:var(--mut)"></span></div>
  </div>

  <label title="How strongly the region absorbs the look of what surrounds it — palette, texture, motifs bleed in from the canvas itself. The glue between regions.">bleed <span class="val" id="wimgVal">0.60</span></label>
  <input type="range" id="wimg" min="0" max="2" step="0.05" value="0.6">

  <div class="row" id="brushActions" style="display:none">
    <button id="genBrush" class="primary" title="generate in the marked area (Enter)">generate</button>
    <button id="clearBrush" title="discard the marked area (Esc)">clear</button>
  </div>

  <details id="advanced">
    <summary>advanced</summary>

    <label title="Width of the soft edge where new melts into old. The weirdness in this band is part of the medium.">falloff <span class="val" id="falloffVal">64</span></label>
    <input type="range" id="falloff" min="0" max="192" step="4" value="64">

    <label title="How hard the words pull, relative to bleed">prompt pull <span class="val" id="wtextVal">1.00</span></label>
    <input type="range" id="wtext" min="0" max="2" step="0.05" value="1.0">

    <label title="How firmly kept pixels pin the new paint at the seams. Keep LOW — the fight in the melt zone is where the good glitches live.">hold <span class="val" id="holdVal">0.30</span></label>
    <input type="range" id="hold" min="0" max="2" step="0.05" value="0.30">

    <label title="Fraction of the area's memory replaced with fresh noise before repainting">start noise <span class="val" id="noiseVal">0%</span></label>
    <input type="range" id="noise" min="0" max="100" step="5" value="0">

    <label title="How boldly each step changes the image — higher is wilder and chunkier">step size <span class="val" id="lrVal">0.10</span></label>
    <input type="range" id="lr" min="0.02" max="0.40" step="0.01" value="0.10">

    <label title="Random peeks CLIP takes per step: more = steadier + denser detail, fewer = faster + looser">cutouts <span class="val" id="cutnVal">32</span></label>
    <input type="range" id="cutn" min="8" max="64" step="4" value="32">

    <label title="Patches = close-ups, detail everywhere (classic). Whole-frame = judges only the big picture.">cutouts style</label>
    <select id="cutmethod">
      <option value="original" selected>patches — detail everywhere</option>
      <option value="pooling">whole-frame — global look</option>
    </select>

    <label title="Lets the bleed wander: 0 = faithful to the neighborhood, higher = dreamlike divergence that still connects">bleed drift <span class="val" id="driftVal">0.00</span></label>
    <input type="range" id="drift" min="0" max="1" step="0.05" value="0">

    <div class="row">
      <button id="bleedFrom" title="Bleed from elsewhere: click this, then click a canvas spot — regions absorb THAT place's look">⊙ bleed from…</button>
      <button id="bleedFromClear" style="display:none">✕</button>
    </div>

    <label title="Same seed + settings + canvas = same result. Blank = random.">seed</label>
    <input type="text" id="seed" placeholder="random">
  </details>

  <div class="global">
    <div class="row">
      <label style="margin:0" title="Canvas side in px. Grows right/down; shrinking crops!">canvas</label>
      <input type="number" id="worldSize" min="1024" max="24576" step="16" value="8192">
      <button id="applyWorld">apply</button>
    </div>
    <div class="row">
      <button id="exportPainted" title="download a PNG of everything painted (auto-cropped)">export painted</button>
      <button id="exportFull" title="download the whole canvas">full</button>
      <label style="margin:0; display:flex; align-items:center; gap:4px; text-transform:none; cursor:pointer"
             title="transparent background instead of gray — half-melted edges become see-through">
        <input type="checkbox" id="exportAlpha" style="width:auto">⌀bg</label>
    </div>
  </div>
</div>

<div id="jobs"></div>

<div id="strip">
  <span id="coords">–</span>
  <span id="stripJob" class="job"></span>
  <span id="stripSave" class="save">–</span>
</div>

<script src="/static/vendor/pixi.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
