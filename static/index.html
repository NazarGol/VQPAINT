<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>VQPAINT</title>
<style>
  :root {
    --paper: #f4f3f0; --card: #ffffff; --line: #e7e6e2; --line2: #d9d7d1;
    --txt: #2b2a28; --mut: #8a8880; --acc: #2f9e63; --accfill: #e4f3ea;
    --warn: #c98a2b; --err: #c74d4d;
    --shadow: 0 1px 2px rgba(30,28,24,.06), 0 6px 24px rgba(30,28,24,.10);
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--paper);
               font: 13px/1.5 system-ui, sans-serif; color: var(--txt); }
  canvas.pixi { position: fixed; inset: 0; }
  .mono { font-family: var(--mono); font-size: 12px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
          box-shadow: var(--shadow); }

  /* ── chrome ─────────────────────────────────── */
  #chromeTL { position: fixed; top: 14px; left: 16px; z-index: 20; padding: 7px 13px;
              display: flex; gap: 10px; align-items: baseline; }
  #chromeTL b { font-weight: 600; letter-spacing: .01em; }
  #chromeTL span { color: var(--mut); }
  #chromeTR { position: fixed; top: 14px; right: 16px; z-index: 20; padding: 5px;
              display: flex; gap: 4px; }
  #zoomctl  { position: fixed; right: 16px; bottom: 52px; z-index: 20; padding: 3px;
              display: flex; align-items: center; gap: 2px; }
  #statusline { position: fixed; right: 16px; bottom: 14px; z-index: 20;
              padding: 5px 11px; display: flex; gap: 14px; color: var(--mut);
              font-family: var(--mono); font-size: 11.5px; }
  #statusline .job { color: var(--warn); }

  button { background: transparent; color: var(--txt); border: 0; border-radius: 8px;
           padding: 7px 12px; font: inherit; cursor: pointer; }
  button:hover { background: #f1efeb; }
  button.primary { background: var(--acc); color: #fff; font-weight: 600; }
  button.primary:hover { background: #278a55; }
  button.chip { border: 1px solid var(--line); border-radius: 99px;
                padding: 3px 11px; font-size: 12px; }
  button.chip.on, button.chip:active { border-color: var(--acc); color: var(--acc);
                background: var(--accfill); }

  /* ── toolbar ────────────────────────────────── */
  #toolbar { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
             z-index: 25; display: flex; align-items: center; gap: 2px; padding: 6px; }
  #toolbar .tsep { width: 1px; height: 26px; background: var(--line); margin: 0 6px; }
  #toolbar button { width: 42px; height: 42px; padding: 0; display: grid;
             place-items: center; border-radius: 10px; color: #55534e; position: relative; }
  #toolbar button svg { width: 21px; height: 21px; stroke: currentColor;
             stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  #toolbar button.active { background: var(--accfill); color: var(--acc); }
  #toolbar button:hover::after { content: attr(data-tip); position: absolute;
             bottom: 52px; left: 50%; transform: translateX(-50%); white-space: nowrap;
             background: #2b2a28; color: #fff; font-size: 11.5px; padding: 4px 9px;
             border-radius: 6px; pointer-events: none; }

  /* ── popover ────────────────────────────────── */
  #popover { position: fixed; z-index: 30; width: 264px; padding: 13px;
             display: none; }
  #popover .arrow { position: absolute; width: 12px; height: 12px;
             background: var(--card); border-left: 1px solid var(--line);
             border-top: 1px solid var(--line); transform: rotate(45deg);
             left: 50%; margin-left: -6px; bottom: -7px;
             border-color: var(--line); border-right: 0; border-bottom: 0;
             rotate: 225deg; }
  #popover.below .arrow { bottom: auto; top: -7px; rotate: 45deg; }
  #popTitle { font-weight: 600; margin-bottom: 6px; }
  label { display: block; margin-top: 9px; color: var(--mut); font-size: 11px;
          text-transform: uppercase; letter-spacing: .06em; cursor: help; }
  label .val { float: right; color: var(--txt); text-transform: none;
               font-family: var(--mono); font-size: 11.5px; }
  textarea { width: 100%; box-sizing: border-box; background: #faf9f7; color: var(--txt);
          border: 1px solid var(--line); border-radius: 8px; padding: 8px; resize: vertical;
          min-height: 46px; font: inherit; margin-top: 4px; }
  textarea:focus, input:focus, select:focus { outline: 2px solid var(--accfill);
          border-color: var(--acc); }
  input[type=range] { width: 100%; height: 22px; accent-color: var(--acc); }
  input[type=number], input[type=text] { width: 92px; background: #faf9f7;
          color: var(--txt); border: 1px solid var(--line); border-radius: 8px;
          padding: 6px 8px; font-family: var(--mono); font-size: 12px; }
  select { width: 100%; background: #faf9f7; color: var(--txt);
          border: 1px solid var(--line); border-radius: 8px; padding: 6px;
          font: inherit; margin-top: 4px; }
  .row { display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .tool-group { display: none; }

  /* ── drawer ─────────────────────────────────── */
  #drawer { position: fixed; left: 16px; bottom: 18px; z-index: 24; }
  #drawerTab { padding: 8px 14px; border-radius: 12px; background: var(--card);
          border: 1px solid var(--line); box-shadow: var(--shadow); color: var(--mut); }
  #drawerBody { display: none; width: 250px; max-height: 62vh; overflow-y: auto;
          padding: 13px; margin-bottom: 8px; }
  #drawer.open #drawerBody { display: block; }
  #drawer.open #drawerTab { color: var(--acc); border-color: var(--acc); }
  .dsec { border-top: 1px solid var(--line); margin-top: 12px; padding-top: 4px; }

  /* ── job toasts ─────────────────────────────── */
  #jobs { position: fixed; right: 16px; bottom: 92px; width: 280px; z-index: 18;
          max-height: 40vh; overflow-y: auto; display: flex;
          flex-direction: column-reverse; gap: 6px; }
  .job { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
         box-shadow: var(--shadow); padding: 7px 10px; font-size: 12px; }
  .job .st-running { color: var(--warn); font-family: var(--mono); }
  .job .st-done { color: var(--acc); } .job .st-error { color: var(--err); }
  .job .st-queued { color: var(--mut); font-family: var(--mono); }
  .job .st-cancelled, .job .st-stopped { color: var(--mut); }
  .job .prompt { color: var(--mut); overflow: hidden; text-overflow: ellipsis;
         white-space: nowrap; }
  .job button { float: right; padding: 1px 8px; font-size: 11px; margin-left: 6px;
         border: 1px solid var(--line); border-radius: 6px; }
</style>
</head>
<body>

<div id="chromeTL" class="card"><b>VQPAINT</b><span id="worldLabel" class="mono">8192px</span></div>
<div id="chromeTR" class="card">
  <button id="fxBtn" title="display effects — never touch the stored canvas">fx</button>
  <button id="undoBtn" title="undo the last operation (Ctrl+Z)">↶</button>
  <button id="exportQuick" title="download everything painted, refined areas at full detail">Export</button>
  <button id="saveNow" title="save a canvas version now">✓</button>
</div>

<div id="toolbar" class="card">
  <button id="toolPlace" class="active" data-tip="place — soft square region (1)">
    <svg viewBox="0 0 21 21"><rect x="4" y="4" width="13" height="13" rx="2.5"/></svg></button>
  <button id="toolBrush" data-tip="brush — paint the area to generate (2)">
    <svg viewBox="0 0 21 21"><path d="M14.5 3.5l3 3L9 15l-4 1 1-4z"/><path d="M12.5 5.5l3 3"/></svg></button>
  <button id="toolGrow" data-tip="grow — click a seed, the region creeps outward along what looks alike (7)">
    <svg viewBox="0 0 21 21"><circle cx="10" cy="11" r="3.2"/><path d="M10 7.8C9 4.5 11.5 3 13.5 3.6M12.8 9.6c3-.8 4.6 1.2 4.4 3.2M11.5 13.8c1.6 2.6-.2 4.6-2.3 4.6M7.4 12.6c-3 .4-4.1-2-3.4-4M8 8.8C6.2 6.8 7.6 4.4 9.4 4.2"/></svg></button>
  <button id="toolRefine" data-tip="refine — add fine detail where you zoom (6)">
    <svg viewBox="0 0 21 21"><circle cx="9.5" cy="9.5" r="5.5"/><path d="M13.7 13.7L18 18M7.5 9.5h4M9.5 7.5v4"/></svg></button>
  <div class="tsep"></div>
  <button id="toolWand" data-tip="select — wand / rect / lasso / similar (3)">
    <svg viewBox="0 0 21 21"><path d="M12 9L4 17M14.5 3.5v3M18 7h-3M16.8 4.2l-2 2M14.5 9.3l-1.6-1.6"/></svg></button>
  <button id="toolLatent" data-tip="latent — instant token ops, pure VQGAN (5)">
    <svg viewBox="0 0 21 21"><path d="M11.5 3L6 12h4l-1.5 6L15 9h-4z"/></svg></button>
  <button id="toolProcess" data-tip="process — set a living rule loose on a region and watch it evolve (8)">
    <svg viewBox="0 0 21 21"><path d="M3 13c2-5 4 3 6-2s4 3 6-2 3 1 3 1M3 17.5c2-4 4 2 6-1.5s4 2 6-1.5 3 .8 3 .8"/><circle cx="10.5" cy="5" r="1.6"/></svg></button>
  <button id="toolGradient" data-tip="gradient — drag a stroke that morphs from one concept to another (9)">
    <svg viewBox="0 0 21 21"><path d="M3.5 15c4-6 10-6 14-9"/><circle cx="3.5" cy="15" r="1.8"/><circle cx="17.5" cy="6" r="1.8" fill="currentColor"/></svg></button>
  <div class="tsep"></div>
  <button id="toolImage" data-tip="image — place a PNG/JPG and paint it in (4)">
    <svg viewBox="0 0 21 21"><rect x="3.5" y="4.5" width="14" height="12" rx="2"/><circle cx="8" cy="9" r="1.4"/><path d="M4 15l4.5-4 3 2.5 3-3 3 3.5"/></svg></button>
  <input type="file" id="imageFile" accept="image/*" style="display:none">
</div>

<div id="popover" class="card">
  <div class="arrow"></div>
  <div id="popTitle"></div>

  <div class="tool-group" data-tool="place brush grow wand image process gradient">
    <label title="What should grow here. LEAVE EMPTY to let the region flow purely out of its surroundings.">prompt</label>
    <textarea id="prompt" placeholder="empty = flow from surroundings"></textarea>
  </div>

  <div class="tool-group" data-tool="refine">
    <label title="How many pixels each canvas pixel becomes: auto picks from your zoom.">detail level</label>
    <select id="refineLevel">
      <option value="0" selected>auto — from zoom</option>
      <option value="1">2× — 1px becomes 2×2</option>
      <option value="2">4×</option>
      <option value="3">8×</option>
      <option value="4">16×</option>
    </select>
    <div id="refineHint" style="color:var(--mut); font-size:12px; margin-top:6px"></div>
  </div>

  <div class="tool-group" data-tool="wand">
    <div class="row">
      <button class="chip selmode on" data-mode="wand" title="click a color — selects the connected same-color area">wand</button>
      <button class="chip selmode" data-mode="similar" title="click anything — selects everything that LOOKS like it, even far away">similar</button>
      <button class="chip selmode" data-mode="rect" title="drag a rectangle">rect</button>
      <button class="chip selmode" data-mode="lasso" title="draw a freehand outline">lasso</button>
      <button class="chip selmode" data-mode="brushsel" title="paint the selection with a round brush">brush</button>
    </div>
    <div id="selParamTol">
      <label title="How different a color can be and still join the selection">tolerance <span class="val" id="tolVal">18</span></label>
      <input type="range" id="tolerance" min="2" max="80" step="1" value="18">
    </div>
    <div id="selParamSim" style="display:none">
      <label title="How semantically close a region must look to join. Lower grabs more.">similarity <span class="val" id="simVal">0.78</span></label>
      <input type="range" id="similarity" min="0.5" max="0.95" step="0.01" value="0.78">
    </div>
    <div id="selParamRad" style="display:none">
      <label title="Selection brush radius">radius <span class="val" id="selRadVal">96</span></label>
      <input type="range" id="selRadius" min="16" max="512" step="8" value="96">
    </div>
    <div class="row" id="selOps" style="display:none">
      <button class="chip" id="selGrow" title="expand the selection edge">grow</button>
      <button class="chip" id="selShrink" title="pull the edge inward">shrink</button>
      <button class="chip" id="selFeather" title="soften the edge">feather</button>
      <button class="chip" id="selInvert" title="select everything in the box EXCEPT this">invert</button>
    </div>
  </div>

  <div class="tool-group" data-tool="latent">
    <label title="Instant material effects — one decode, no AI steering. They rework the VQGAN 'weave' the picture is made of.">effect</label>
    <select id="latentOp">
      <option value="spray" selected>material spray</option>
      <option value="smear">smear / drag</option>
      <option value="neighbor">subtle corruption</option>
      <option value="shift">slide</option>
      <option value="mirror">mirror</option>
      <option value="repeat">textile tiling</option>
      <option value="bloom">melt / bloom</option>
    </select>
    <div id="latDesc" style="color:var(--mut); font-size:12px; margin-top:6px"></div>
    <div id="latAmountRow">
      <label title="How much of the area gets hit">amount <span class="val" id="latAmountVal">50%</span></label>
      <input type="range" id="latAmount" min="0" max="100" step="5" value="50">
    </div>
    <div class="row" id="latPaRow">
      <label style="margin:0" id="latPaLabel">param</label>
      <input type="range" id="latPaSlider" min="1" max="8" step="1" value="2" style="flex:1">
      <span class="val mono" id="latPaVal">2</span>
      <input type="number" id="latPa" value="2" style="display:none">
      <input type="number" id="latPb" value="0" style="display:none">
    </div>
    <div class="row" id="latAxisRow" style="display:none">
      <button class="chip on" id="latAxisH" title="left-right flip">horizontal</button>
      <button class="chip" id="latAxisV" title="top-bottom flip">vertical</button>
    </div>
    <div class="row">
      <button id="latApplySel" class="primary" style="display:none"
              title="apply inside the active selection">apply to selection</button>
    </div>
  </div>

  <div class="tool-group" data-tool="grow">
    <label title="How far the region can creep from your click">reach <span class="val" id="reachVal">320</span></label>
    <input type="range" id="reach" min="64" max="1024" step="16" value="320">
    <label title="0 = compact blob, 1 = wild uneven tendrils">irregularity <span class="val" id="irrVal">0.60</span></label>
    <input type="range" id="irregularity" min="0" max="1" step="0.05" value="0.6">
    <label title="How much the growth hugs visually similar content: 0 ignores the picture, 1 creeps only along look-alike forms">flow into similar <span class="val" id="flowVal">0.65</span></label>
    <input type="range" id="flow" min="0" max="1" step="0.05" value="0.65">
    <div class="row"><button id="regrow" class="chip" title="same spot, new shape">↻ regrow</button></div>
  </div>

  <div class="tool-group" data-tool="process">
    <label title="A rule applied over and over to the region's latent fabric — you watch it evolve. Every state stays inside VQGAN's material vocabulary.">rule</label>
    <select id="procRule">
      <option value="reaction_diffusion" selected>turing patterns</option>
      <option value="life_ca">cellular life</option>
      <option value="diffuse_flow">flow / smear</option>
      <option value="decay_grow">decay / crystallize</option>
      <option value="feedback_bloom">feedback bloom</option>
      <option value="two_clip_tension">two-prompt tension</option>
    </select>
    <div id="procDesc" style="color:var(--mut); font-size:12px; margin-top:6px"></div>
    <div class="row">
      <button class="chip" id="procFlip" title="reverse the process's polarity">⇄ flip</button>
      <button class="chip" id="procLive" title="run forever until you press stop (autosaves as it goes)">∞ live</button>
      <button class="chip" id="procCanvas" title="run the process across everything painted, tile by tile">whole canvas</button>
      <button class="chip" id="procNoUndo" title="point of no return: skip the undo snapshot (for very long boils)">🔥 no undo</button>
    </div>
    <label title="The leash. 0 = coherent evolution (snapped to real VQGAN material every step). Higher = the field drifts off-codebook between snaps, rules un-damp, noise pours in — up to boiling divergence at 1. The snap-back moments are glitches; that's the point.">CHAOS <span class="val" id="procChaosVal">0.15</span></label>
    <input type="range" id="procChaos" min="0" max="1" step="0.05" value="0.15">
    <label id="procPaLabel">param A <span class="val" id="procPaVal">0.50</span></label>
    <input type="range" id="procPa" min="0" max="1" step="0.05" value="0.5">
    <label id="procPbLabel">param B <span class="val" id="procPbVal">0.50</span></label>
    <input type="range" id="procPb" min="0" max="1" step="0.05" value="0.5">
    <label title="Resolution, NOT chaos: run the rule on a finer detail plane — more cells over the same area = finer pattern. Needs a smaller region at higher levels.">resolution</label>
    <select id="procLevel">
      <option value="0" selected>canvas</option>
      <option value="1">2× fine plane</option>
      <option value="2">4× fine plane</option>
      <option value="3">8× fine plane</option>
    </select>
    <label title="Budget mode: how many steps before it stops">steps <span class="val" id="procStepsVal">200</span></label>
    <input type="range" id="procSteps" min="10" max="1000" step="10" value="200">
    <div id="procPrompt2Row" style="display:none">
      <label title="The second force — the region is pulled toward BOTH prompts and the boundary between them migrates">prompt B (vs prompt above)</label>
      <textarea id="prompt2" placeholder="the opposing force…" style="min-height:36px"></textarea>
    </div>
  </div>

  <div class="tool-group" data-tool="gradient">
    <label title="The stroke starts as this concept (the main prompt above is the START)…">…and ends as</label>
    <textarea id="gradTo" placeholder="what the stroke becomes" style="min-height:36px"></textarea>
    <div style="color:var(--mut); font-size:12px; margin-top:6px">drag a stroke — one gesture morphs from the prompt above to this, across space</div>
  </div>

  <div class="tool-group" data-tool="brush gradient">
    <label title="Brush radius in canvas pixels">radius <span class="val" id="radiusVal">96</span></label>
    <input type="range" id="radius" min="16" max="512" step="8" value="96">
  </div>

  <div class="tool-group" data-tool="place image latent refine process">
    <label title="Region side in canvas pixels. Beyond 576 the engine works coarser and stretches — like a wide brush.">size <span class="val" id="sizeVal">512</span></label>
    <input type="range" id="size" min="128" max="2048" step="16" value="512">
  </div>

  <div class="tool-group" data-tool="image">
    <label title="How much of your image survives: low = ghost armature, high = recognizably yours. It always gets VQGAN-ified.">source strength <span class="val" id="strengthVal">0.60</span></label>
    <input type="range" id="strength" min="0" max="1" step="0.05" value="0.6">
    <div class="row"><button id="pickImage" class="chip">choose image…</button>
      <span id="imageName" style="color:var(--mut); font-size:12px"></span></div>
  </div>

  <div class="tool-group" data-tool="place brush grow wand refine image gradient">
    <label title="How long it cooks: low = soft and dreamy, high = crisp, very high = fried. ~2 it/s.">iterations <span class="val" id="itersVal">200</span></label>
    <input type="range" id="iters" min="10" max="1500" step="5" value="200">
    <div class="row">
      <button class="chip" id="presetDraft" title="fast feedback: 80 iterations">draft</button>
      <button class="chip" id="presetRefine" title="full cook: 350 iterations">refine</button>
    </div>
  </div>

  <div class="tool-group" data-tool="place brush grow wand image gradient">
    <label title="How strongly the region absorbs the look of its surroundings — the glue between regions.">bleed <span class="val" id="wimgVal">0.60</span></label>
    <input type="range" id="wimg" min="0" max="2" step="0.05" value="0.6">
  </div>

  <div class="row">
    <button id="genBrush" class="primary" title="run it (Enter)">Generate</button>
    <button id="clearBrush" title="discard (Esc)">✕</button>
    <button id="advOpen" title="all the deeper knobs">Advanced ▸</button>
  </div>
</div>

<div id="drawer">
  <div id="drawerBody" class="card">
    <label title="Width of the soft edge where new melts into old — the weirdness there is the medium.">falloff <span class="val" id="falloffVal">64</span></label>
    <input type="range" id="falloff" min="0" max="192" step="4" value="64">

    <label title="How torn the region's edge is. 0 = clean geometric ramp, high = ragged, wispy, cloud-like — no region reads as a rectangle.">edge chaos <span class="val" id="chaosVal">0.50</span></label>
    <input type="range" id="edgechaos" min="0" max="1" step="0.05" value="0.5">

    <label title="How hard the words pull, relative to bleed">prompt pull <span class="val" id="wtextVal">1.00</span></label>
    <input type="range" id="wtext" min="0" max="2" step="0.05" value="1.0">

    <label title="How firmly kept pixels pin the new paint at the seams. Keep LOW — the fight in the melt zone is where the good glitches live.">hold <span class="val" id="holdVal">0.30</span></label>
    <input type="range" id="hold" min="0" max="2" step="0.05" value="0.30">

    <label title="Fraction of the area's memory replaced with fresh noise before repainting">start noise <span class="val" id="noiseVal">0%</span></label>
    <input type="range" id="noise" min="0" max="100" step="5" value="0">

    <label title="How boldly each step changes the image">step size <span class="val" id="lrVal">0.10</span></label>
    <input type="range" id="lr" min="0.02" max="0.40" step="0.01" value="0.10">

    <label title="Random peeks CLIP takes per step: more = steadier + denser, fewer = faster + wilder">cutouts <span class="val" id="cutnVal">32</span></label>
    <input type="range" id="cutn" min="8" max="64" step="4" value="32">

    <label title="Patches = close-ups, detail everywhere. Whole-frame = judges only the big picture.">cutouts style</label>
    <select id="cutmethod">
      <option value="original" selected>patches — detail everywhere</option>
      <option value="pooling">whole-frame — global look</option>
    </select>

    <label title="Lets the bleed wander: 0 = faithful, higher = dreamlike divergence that still connects">bleed drift <span class="val" id="driftVal">0.00</span></label>
    <input type="range" id="drift" min="0" max="1" step="0.05" value="0">

    <div class="row">
      <button id="bleedFrom" class="chip" title="click this, then a canvas spot — regions absorb THAT place's look">⊙ bleed from…</button>
      <button id="bleedFromClear" class="chip" style="display:none">✕</button>
    </div>

    <label title="Same seed + settings + canvas = same result. Blank = random.">seed</label>
    <input type="text" id="seed" placeholder="random">

    <div class="dsec"></div>
    <div class="row">
      <label style="margin:0" title="Canvas side in px. Grows right/down; shrinking crops!">canvas</label>
      <input type="number" id="worldSize" min="1024" max="24576" step="16" value="8192">
      <button id="applyWorld" class="chip">apply</button>
    </div>
    <div class="row">
      <button id="exportPainted" class="chip" title="everything painted, auto-cropped">export painted</button>
      <button id="exportFull" class="chip" title="the whole canvas">full</button>
    </div>
    <div class="row">
      <select id="exportScale" style="width:auto" title="output px per canvas px — auto uses your finest detail level">
        <option value="auto" selected>auto</option>
        <option value="1">1×</option><option value="2">2×</option>
        <option value="4">4×</option><option value="8">8×</option>
      </select>
      <label style="margin:0; display:flex; align-items:center; gap:4px; text-transform:none; cursor:pointer"
             title="transparent background — half-melted edges become see-through">
        <input type="checkbox" id="exportAlpha" style="width:auto">transparent</label>
    </div>
  </div>
  <button id="drawerTab">⚙ Advanced</button>
</div>

<div id="jobs"></div>

<div id="fxCard" class="card" style="position:fixed; top:64px; right:16px; z-index:31; width:250px; padding:13px; display:none">
  <div style="font-weight:600; margin-bottom:2px">View effects</div>
  <div style="color:var(--mut); font-size:12px">display-only — stored pixels untouched; baked only on "export with fx"</div>
  <div id="fxRows"></div>
  <div class="row"><button id="fxExport" class="chip" title="bake the active effects into a PNG (≤4096px)">export with fx</button></div>
</div>

<div id="histCard" class="card" style="position:fixed; z-index:32; width:280px; padding:12px; display:none">
  <div style="font-weight:600; margin-bottom:6px">History here <span style="color:var(--mut); font-weight:400">— double-clicked spot</span></div>
  <div id="histList" style="max-height:40vh; overflow-y:auto"></div>
</div>

<div id="zoomctl" class="card">
  <button id="zoomOut" title="zoom out">−</button>
  <span id="zoomPct" class="mono" style="min-width:44px; text-align:center">100%</span>
  <button id="zoomIn" title="zoom in">+</button>
</div>
<div id="statusline" class="card">
  <span id="coords">–</span>
  <span id="stripJob" class="job"></span>
  <span id="stripSave">–</span>
</div>

<script src="/static/vendor/pixi.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
